# 跑在 Alpine 里的精简 Nginx
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # 开启 Gzip 压缩，让殿下的黑白 UI 加载速度突破天际！🚀
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen       80;
        server_name  localhost; # 如果殿下有内网域名，可以写在这里

        # 🎨 前端静态资源路由
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            # 解决 Vue/React 单页应用的路由刷新 404 问题
            try_files $uri $uri/ /index.html; 
        }

        # 🧠 后端 API 反向代理
        location /api/ {
            # 这里的 'backend' 就是 docker-compose 里定义的服务名，Docker 的内置 DNS 会自动解析！
            proxy_pass http://backend:8000/api/;
            
            # 传递真实的客户端信息给后端
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 针对 TTS 语音流和文件上传，放宽限制
            client_max_body_size 100M; # 允许上传最大 100MB 的书籍
            proxy_buffering off;       # 关掉代理缓冲，让 TTS 语音流能实时推送到前端！🎙️
            proxy_read_timeout 300s;   # 防止后台转换 EPUB 时间太长导致超时
        }
    }
}
